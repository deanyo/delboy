  <script src="generator.js"></script>
  <script>
    const history = [];
    document.getElementById('gen-btn').addEventListener('click', () => {
      const d = generateDrink();
      document.getElementById('gen-drink').textContent = d.name;
      document.getElementById('gen-desc').textContent = d.description;
      document.getElementById('gen-quote').textContent = `"${d.quote}"`;
      document.getElementById('gen-result').classList.add('gen-active');

      history.unshift(d);
      if (history.length > 10) history.pop();
      document.getElementById('gen-history').innerHTML =
        '<div class="gen-history-title">previous rounds</div>' +
        history.slice(1).map(h =>
          `<div class="gen-history-item">${h.name}</div>`
        ).join('');
    });
  </script>
